baseURL: https://example.org/
locale: zh-cn
title: 雪邮的博客
theme: stack

defaultContentLanguage: zh-cn
hasCJKLanguage: true

enableEmoji: true
enableRobotsTXT: true

pagination:
  pagerSize: 10

buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS

permalinks:
  post: /p/:slug/
  page: /:slug/

params:
  mainSections:
    - post
  rssFullContent: true
  description: "分享技术、生活与思考"
  author: 雪邮

  # 侧边栏
  sidebar:
    emoji: ""
    subtitle: "分享技术、生活与思考"
    avatar: "img/avatar.jpg"

  # 页脚
  footer:
    since: 2026

  # 文章设置
  article:
    toc: true
    readingTime: true
    headingAnchor: false
    license:
      enabled: false
      default: "Licensed under CC BY-NC-SA 4.0"

  # 主题切换
  colorScheme:
    toggle: true
    default: auto

  # 侧边栏小部件
  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
    page:
      - type: toc

  # 评论（暂时关闭）
  comments:
    enabled: false

  imageProcessing:
    content:
      enabled: true
    thumbnail:
      enabled: true

# 社交链接
menu:
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/
      params:
        icon: brand-github
    - identifier: rss
      name: RSS
      url: /index.xml
      params:
        icon: rss

# Markdown 渲染设置
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 4
    ordered: true
    startLevel: 2
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4
